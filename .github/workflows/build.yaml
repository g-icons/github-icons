name: CI

on:
  pull_request:
    branches: ["**"]

jobs:
  build-and-check:
    name: Build and checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run compile

      - name: Build (Chrome)
        run: npm run build

      - name: Build (Firefox)
        run: npm run build:firefox
