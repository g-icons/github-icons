name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature or improvement would you like to see?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why would this be useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / mockups
      description: If applicable, add visuals to help explain your idea.
    validations:
      required: false
