version = "0.7.1"

[settings]
mode = "branch"
prompt = "never"
prompt_prefixes = [
    "feature",
    "release",
]

[sync]
monorepo = "lockstep"
constants = "curated"
exclude = ["test/**"]

[prefixes]
feature = "minor"
fix = "patch"
release = "major"

[release]
enabled = false
on_bump = []
match = ""
skip = ""
